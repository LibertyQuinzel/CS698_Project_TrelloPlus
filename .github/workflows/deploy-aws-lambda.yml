name: Deploy AWS Lambda

on:
  push:
    branches:
      - main
      - master
      - deployment
  workflow_dispatch:

jobs:
  deploy-lambda:
    name: Package and Deploy Backend Lambda
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate deployment secrets
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          if [ -z "$LAMBDA_FUNCTION_NAME" ]; then
            echo "Missing GitHub secret: AWS_LAMBDA_FUNCTION_NAME" >&2
            exit 1
          fi

          if [ -z "$LAMBDA_ARTIFACTS_BUCKET" ]; then
            echo "Missing GitHub secret: AWS_LAMBDA_ARTIFACTS_BUCKET" >&2
            exit 1
          fi

          if [ -z "$CORS_ALLOWED_ORIGINS" ]; then
            echo "Missing GitHub secret: CORS_ALLOWED_ORIGINS" >&2
            exit 1
          fi

      - name: Package Lambda artifact
        run: |
          cd backend
          mvn -B -ntp -Plambda clean package
          zip -j flowboard-backend-lambda.zip target/flowboard-backend-1.0.0.jar

      - name: Upload artifact to S3
        env:
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.zip
        run: |
          aws s3 cp \
            backend/flowboard-backend-lambda.zip \
            s3://$LAMBDA_ARTIFACTS_BUCKET/$ARTIFACT_KEY

      - name: Update Lambda function code
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.zip
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --s3-bucket "$LAMBDA_ARTIFACTS_BUCKET" \
            --s3-key "$ARTIFACT_KEY"

          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Update Lambda runtime configuration
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SPRING_PROFILES_ACTIVE: prod
        run: |
          EXISTING_VARS=$(aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Environment.Variables' \
            --output json)

          UPDATED_VARS=$(echo "$EXISTING_VARS" | jq \
            --arg cors "$CORS_ALLOWED_ORIGINS" \
            --arg springProfile "$SPRING_PROFILES_ACTIVE" \
            '. + {CORS_ALLOWED_ORIGINS: $cors, SPRING_PROFILES_ACTIVE: $springProfile}')

          ATTEMPT=1
          MAX_ATTEMPTS=6
          until aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment "{\"Variables\":$UPDATED_VARS}"; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Failed to update Lambda configuration after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi

            echo "Lambda configuration update conflicted (attempt $ATTEMPT/$MAX_ATTEMPTS). Retrying in 10s..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Configure API Gateway CORS for auth login
        env:
          REST_API_ID: ${{ secrets.AWS_API_GATEWAY_REST_API_ID }}
          STAGE_NAME: ${{ secrets.AWS_API_GATEWAY_STAGE }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          if [ -z "$REST_API_ID" ]; then
            echo "Skipping API Gateway CORS setup: AWS_API_GATEWAY_REST_API_ID is not configured."
            exit 0
          fi

          if ! aws apigateway get-rest-api --rest-api-id "$REST_API_ID" >/dev/null 2>&1; then
            echo "Skipping API Gateway CORS setup: current AWS credentials do not have required apigateway permissions." >&2
            echo "Grant apigateway:GET/POST/PUT/PATCH on this REST API to enable automated CORS provisioning." >&2
            exit 0
          fi

          if [ -z "$STAGE_NAME" ]; then
            STAGE_NAME="prod"
          fi

          PRIMARY_ORIGIN=$(echo "$CORS_ALLOWED_ORIGINS" | cut -d',' -f1 | xargs)
          if [ -z "$PRIMARY_ORIGIN" ]; then
            echo "CORS_ALLOWED_ORIGINS must contain at least one origin." >&2
            exit 1
          fi

          RESOURCE_ID=$(aws apigateway get-resources \
            --rest-api-id "$REST_API_ID" \
            --query "items[?path=='/auth/login'].id | [0]" \
            --output text)

          if [ -z "$RESOURCE_ID" ] || [ "$RESOURCE_ID" = "None" ]; then
            RESOURCE_ID=$(aws apigateway get-resources \
              --rest-api-id "$REST_API_ID" \
              --query "items[?path=='/{proxy+}'].id | [0]" \
              --output text)
          fi

          if [ -z "$RESOURCE_ID" ] || [ "$RESOURCE_ID" = "None" ]; then
            echo "Unable to locate API Gateway resource path /auth/login or /{proxy+} for REST API $REST_API_ID" >&2
            exit 1
          fi

          if ! aws apigateway get-method \
            --rest-api-id "$REST_API_ID" \
            --resource-id "$RESOURCE_ID" \
            --http-method OPTIONS >/dev/null 2>&1; then
            aws apigateway put-method \
              --rest-api-id "$REST_API_ID" \
              --resource-id "$RESOURCE_ID" \
              --http-method OPTIONS \
              --authorization-type NONE \
              --no-api-key-required
          fi

          aws apigateway put-integration \
            --rest-api-id "$REST_API_ID" \
            --resource-id "$RESOURCE_ID" \
            --http-method OPTIONS \
            --type MOCK \
            --request-templates '{"application/json":"{\"statusCode\":200}"}'

          aws apigateway put-method-response \
            --rest-api-id "$REST_API_ID" \
            --resource-id "$RESOURCE_ID" \
            --http-method OPTIONS \
            --status-code 200 \
            --response-parameters \
              "method.response.header.Access-Control-Allow-Origin=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Credentials=true"

          aws apigateway put-integration-response \
            --rest-api-id "$REST_API_ID" \
            --resource-id "$RESOURCE_ID" \
            --http-method OPTIONS \
            --status-code 200 \
            --response-parameters \
              "method.response.header.Access-Control-Allow-Origin='${PRIMARY_ORIGIN}',method.response.header.Access-Control-Allow-Methods='OPTIONS,POST',method.response.header.Access-Control-Allow-Headers='Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token',method.response.header.Access-Control-Allow-Credentials='true'"

          aws apigateway put-gateway-response \
            --rest-api-id "$REST_API_ID" \
            --response-type DEFAULT_4XX \
            --response-parameters \
              "gatewayresponse.header.Access-Control-Allow-Origin='${PRIMARY_ORIGIN}',gatewayresponse.header.Access-Control-Allow-Headers='Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token',gatewayresponse.header.Access-Control-Allow-Methods='OPTIONS,GET,POST,PUT,DELETE'"

          aws apigateway put-gateway-response \
            --rest-api-id "$REST_API_ID" \
            --response-type DEFAULT_5XX \
            --response-parameters \
              "gatewayresponse.header.Access-Control-Allow-Origin='${PRIMARY_ORIGIN}',gatewayresponse.header.Access-Control-Allow-Headers='Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token',gatewayresponse.header.Access-Control-Allow-Methods='OPTIONS,GET,POST,PUT,DELETE'"

          aws apigateway create-deployment \
            --rest-api-id "$REST_API_ID" \
            --stage-name "$STAGE_NAME"
