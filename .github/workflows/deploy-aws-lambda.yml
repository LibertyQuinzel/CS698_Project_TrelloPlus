name: Deploy AWS Lambda

on:
  push:
    branches:
      - main
      - master
      - deployment
  workflow_dispatch:

jobs:
  deploy-lambda:
    name: Package and Deploy Backend Lambda
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda artifact
        run: |
          cd backend
          mvn -B -ntp -Plambda clean package
          zip -j flowboard-backend-lambda.zip target/flowboard-backend-1.0.0.jar

      - name: Upload artifact to S3
        env:
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.zip
        run: |
          aws s3 cp \
            backend/flowboard-backend-lambda.zip \
            s3://${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}/$ARTIFACT_KEY

      - name: Update Lambda function code
        env:
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.zip
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}" \
            --s3-bucket "${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}" \
            --s3-key "$ARTIFACT_KEY"
