name: Run Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowboard
          POSTGRES_USER: flowboard
          POSTGRES_PASSWORD: flowboard_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build backend
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: flowboard
          DB_USERNAME: flowboard
          DB_PASSWORD: flowboard_password
          AWS_REGION: us-east-2
        run: mvn -B -ntp clean package -DskipTests

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start backend in background
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: flowboard
          DB_USERNAME: flowboard
          DB_PASSWORD: flowboard_password
          AWS_REGION: us-east-2
          SERVER_PORT: 8080
        run: |
          # Find the JAR file
          JAR_FILE=$(ls -t target/*.jar 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No JAR file found in target/"
            ls -la target/
            exit 1
          fi
          echo "Starting backend with: $JAR_FILE"
          java -jar "$JAR_FILE" > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          
          # Wait for backend to be ready (up to 60 seconds)
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i: Waiting for backend to be ready..."
            sleep 2
          done
          
          echo "Backend failed to start. Logs:"
          cat /tmp/backend.log
          exit 1

      - name: Start frontend dev server in background
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
          VITE_WS_ENDPOINT: http://localhost:8080/api/v1/ws/board
        run: |
          npm run dev > /tmp/frontend.log 2>&1 &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          
          # Wait for frontend to be ready (up to 30 seconds)
          for i in {1..15}; do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Attempt $i: Waiting for frontend to be ready..."
            sleep 2
          done
          
          echo "Frontend failed to start. Logs:"
          cat /tmp/frontend.log
          exit 1

      - name: Run integration tests
        working-directory: frontend
        env:
          FRONTEND_BASE: http://localhost:5173
          BACKEND_BASE: http://localhost:8080/api/v1
          TEST_PASSWORD: StrongPass!123
          TEST_EMAIL_PREFIX: ci.integration
          TEST_FULL_NAME_PREFIX: CI Integration
          HEADLESS: 'true'
          CLEANUP: 'true'
          RUN_DEPLOYMENT_ONLY_CASES: 'false'
        run: npm run test:integration:fullstack

      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: |
            /tmp/backend.log
            /tmp/frontend.log

      - name: Publish test results
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Fullstack integration tests completed" >> $GITHUB_STEP_SUMMARY
