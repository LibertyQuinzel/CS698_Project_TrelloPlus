name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Tests
    uses: ./.github/workflows/run-frontend-tests.yml
    secrets: inherit

  backend-tests:
    name: Backend Tests
    needs: frontend-tests
    uses: ./.github/workflows/run-backend-tests.yml
    secrets: inherit

  integration-tests:
    name: Integration Tests
    needs: backend-tests
    uses: ./.github/workflows/run-integration-tests.yml
    secrets: inherit

  deploy-backend:
    name: Deploy Backend & WebSocket Lambda
    needs: integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-aws-lambda.yml
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend Amplify
    needs: deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-aws-amplify.yml
    secrets: inherit