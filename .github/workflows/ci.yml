name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - deployment
    paths-ignore:
      - '**/*.md'
      - docs/**
      - Screenshots/**
      - coverage/**
  pull_request:
    paths-ignore:
      - '**/*.md'
      - docs/**
      - Screenshots/**
      - coverage/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test -- --ci --runInBand

      - name: Build frontend
        run: npm run build

  backend-tests:
    name: Backend Build and Test
    needs: frontend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowboard
          POSTGRES_USER: flowboard
          POSTGRES_PASSWORD: flowboard_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowboard -d flowboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/flowboard
      SPRING_DATASOURCE_USERNAME: flowboard
      SPRING_DATASOURCE_PASSWORD: flowboard_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: mvn -B -ntp clean verify

  integration-tests:
    name: Fullstack Integration Tests
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowboard
          POSTGRES_USER: flowboard
          POSTGRES_PASSWORD: flowboard_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowboard -d flowboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/flowboard
      DB_USERNAME: flowboard
      DB_PASSWORD: flowboard_password
      JWT_SECRET: ci-secret-key-with-at-least-32-characters
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:*,http://localhost:*
      VITE_API_BASE_URL: http://127.0.0.1:8080/api/v1
      VITE_WS_ENDPOINT: http://127.0.0.1:8080/api/v1/ws/board
      VITE_REQUEST_TIMEOUT_MS: 30000
      VITE_LLM_REQUEST_TIMEOUT_MS: 90000
      PLAYWRIGHT_BROWSERS_PATH: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps

      - name: Start backend
        run: |
          cd backend
          mvn -B -ntp spring-boot:run \
            -Dspring-boot.run.arguments='--server.port=8080 --spring.profiles.active=dev' \
            > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/v1/auth/login || true)
            if [ "$code" != "000" ]; then
              echo "Backend is up with status $code"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Start frontend
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5173/login || true)
            if [ "$code" = "200" ]; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Run integration tests
        run: npm run test:integration:fullstack

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            backend.log
            frontend.log

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then kill $(cat backend.pid) || true; fi
          if [ -f frontend.pid ]; then kill $(cat frontend.pid) || true; fi

  deploy-frontend:
    name: Deploy Frontend to Amplify
    needs: integration-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger Amplify deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AWS_AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ secrets.AWS_AMPLIFY_BRANCH }}
        run: |
          if [ -z "$AMPLIFY_APP_ID" ] || [ -z "$AMPLIFY_BRANCH" ]; then
            echo "Missing Amplify secrets; skipping frontend deployment"
            exit 0
          fi
          aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE

  deploy-backend:
    name: Deploy Backend Lambda
    needs: integration-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate deployment secrets
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
        run: |
          if [ -z "$LAMBDA_FUNCTION_NAME" ] || [ -z "$LAMBDA_ARTIFACTS_BUCKET" ]; then
            echo "Missing Lambda secrets; skipping backend deployment"
            exit 0
          fi

      - name: Package Lambda artifact
        run: |
          cd backend
          mvn -B -ntp -Plambda clean package
          cp target/flowboard-backend-1.0.0.jar flowboard-backend-lambda.jar

      - name: Upload artifact to S3
        env:
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.jar
        run: |
          aws s3 cp \
            backend/flowboard-backend-lambda.jar \
            s3://$LAMBDA_ARTIFACTS_BUCKET/$ARTIFACT_KEY

      - name: Update Lambda function code
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          LAMBDA_ARTIFACTS_BUCKET: ${{ secrets.AWS_LAMBDA_ARTIFACTS_BUCKET }}
          ARTIFACT_KEY: lambda/${{ github.repository }}/${{ github.ref_name }}/flowboard-backend-${{ github.sha }}.jar
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --s3-bucket "$LAMBDA_ARTIFACTS_BUCKET" \
            --s3-key "$ARTIFACT_KEY"

          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Update Lambda runtime configuration
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SPRING_PROFILES_ACTIVE: prod
        run: |
          EXISTING_VARS=$(aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Environment.Variables' \
            --output json)

          UPDATED_VARS=$(echo "$EXISTING_VARS" | jq \
            --arg cors "$CORS_ALLOWED_ORIGINS" \
            --arg springProfile "$SPRING_PROFILES_ACTIVE" \
            '. + {CORS_ALLOWED_ORIGINS: $cors, SPRING_PROFILES_ACTIVE: $springProfile}')

          ATTEMPT=1
          MAX_ATTEMPTS=6
          until aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment "{\"Variables\":$UPDATED_VARS}"; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Failed to update Lambda configuration after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi

            echo "Lambda configuration update conflicted (attempt $ATTEMPT/$MAX_ATTEMPTS). Retrying in 10s..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"

