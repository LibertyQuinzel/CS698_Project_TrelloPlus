services:
  postgres:
    image: postgres:16
    container_name: flowboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowboard}
      POSTGRES_USER: ${POSTGRES_USER:-flowboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - flowboard_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowboard} -d ${POSTGRES_DB:-flowboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  flowboard_pg_data:
