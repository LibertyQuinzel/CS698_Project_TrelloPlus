spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.flowboard: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}

ai:
  mock-enabled: ${AI_MOCK_ENABLED:true}
  openai:
    api-key: ${OPENAI_API_KEY:mock-key}
    model: ${OPENAI_MODEL:gpt-4-1106-preview}
